# fly.toml app configuration file generated for pf-chatbot on 2026-04-06T16:26:18+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pf-chatbot'
primary_region = 'nrt'

[build]
  dockerfile = "Dockerfile"

[env]
  CHROMA_DIR = '/data/chroma_db'

[[mounts]]
  source = 'chroma_data'
  destination = '/data/chroma_db'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
